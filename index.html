<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>夜晚飞行棋</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#1a1a2e,#0f0f1b);
  font-family:Arial;
  text-align:center;
  color:white;
}

h2{margin-top:15px;}

.board{
  width:360px;
  height:360px;
  margin:20px auto;
  position:relative;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  grid-template-rows:repeat(6,1fr);
  gap:4px;
}

.cell{
  background:#1b1b33;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  box-shadow:0 0 6px rgba(255,75,138,0.3);
}

.path{
  background:#22224a;
}

.p1{
  background:#ff4b8a !important;
  box-shadow:0 0 15px #ff4b8a;
}

.p2{
  background:#00f0ff !important;
  box-shadow:0 0 15px #00f0ff;
}

button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:20px;
  background:#ff4b8a;
  color:white;
  box-shadow:0 0 15px #ff4b8a;
}

#status{margin-top:10px;}

.win{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  display:none;
}
</style>
</head>

<body>

<h2>🌙 夜晚飞行棋对战</h2>
<div id="status">当前玩家：玩家1</div>

<div class="board" id="board"></div>

<button onclick="roll()">🎲 掷骰子</button>

<div class="win" id="winBox">
  <h1 id="winText"></h1>
  <button onclick="location.reload()">再来一局</button>
</div>

<script>
const board=document.getElementById("board");

/* 飞行棋路径（绕圈） */
const pathIndex=[
  30,31,32,33,34,35,
  29,23,17,11,5,
  4,3,2,1,0,
  6,12,18,24,
  25,26,27,28
];

/* 生成6x6棋盘 */
for(let i=0;i<36;i++){
  let cell=document.createElement("div");
  cell.className="cell";
  cell.id="c"+i;
  board.appendChild(cell);
}

/* 标记路径 */
pathIndex.forEach(i=>{
  document.getElementById("c"+i).classList.add("path");
});

let p1=-1,p2=-1;
let current=1;

function updateBoard(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("p1","p2");
  });

  if(p1>=0) document.getElementById("c"+pathIndex[p1]).classList.add("p1");
  if(p2>=0) document.getElementById("c"+pathIndex[p2]).classList.add("p2");
}

function roll(){
  let dice=Math.floor(Math.random()*6)+1;

  let playerPos=current===1?p1:p2;

  if(playerPos===-1){
    if(dice===6){
      if(current===1)p1=0;
      else p2=0;
    }
  }else{
    playerPos+=dice;
    if(playerPos>=pathIndex.length-1){
      document.getElementById("winText").innerText="💘 玩家"+current+" 胜利！";
      document.getElementById("winBox").style.display="flex";
      return;
    }

    if(current===1)p1=playerPos;
    else p2=playerPos;
  }

  /* 踩人规则 */
  if(p1===p2 && p1!==-1){
    if(current===1)p2=-1;
    else p1=-1;
  }

  updateBoard();

  if(dice!==6){
    current=current===1?2:1;
  }

  document.getElementById("status").innerText="当前玩家：玩家"+current;
}
</script>

</body>
</html>
