<script>
const board=document.getElementById("board");

/* 生成100格 */
for(let i=1;i<=100;i++){
  let cell=document.createElement("div");
  cell.className="cell";
  cell.id="c"+i;
  cell.innerText=i;
  board.appendChild(cell);
}

/* 情侣任务数组 */
const tasks=[
"说一句喜欢对方的话",
"牵手5秒",
"对视3秒",
"夸对方一句",
"轻轻靠近",
"抱一下",
"说最喜欢对方哪里",
"给一个温柔微笑",
"说未来想一起做的事",
"轻声叫昵称"
];

/* 奖励和惩罚数组 */
const rewards=[
"💚 前进2格",
"💚 额外再掷一次骰子",
"💚 互相拥抱一下",
"💚 对方夸你一句"
];

const penalties=[
"❤️ 后退2格",
"❤️ 本轮跳过一次",
"❤️ 做一个搞笑动作",
"❤️ 说一句害羞的话"
];

let p1=-1, p2=-1;
let current=1;
let moving=false; // 防止重复点击骰子
let skipNext = {1:false,2:false}; // 本轮跳过标记

function updateBoard(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("p1","p2");
  });
  if(p1>=1) document.getElementById("c"+p1).classList.add("p1");
  if(p2>=1) document.getElementById("c"+p2).classList.add("p2");
}

function sleep(ms){ return new Promise(resolve=>setTimeout(resolve,ms)); }

async function roll(){
  if(moving) return; 
  moving = true;

  // 跳过回合检查
  if(skipNext[current]){
    document.getElementById("status").innerText="玩家"+current+" 本轮跳过!";
    skipNext[current] = false;
    current = current===1?2:1;
    moving=false;
    return;
  }

  let dice = Math.floor(Math.random()*6)+1;
  document.getElementById("status").innerText="玩家"+current+" 掷出："+dice;

  let pos = current===1 ? p1 : p2;

  if(pos === -1){
    if(dice === 6){
      pos = current===1 ? 1 : 51;
      if(current===1) p1=pos; else p2=pos;
      updateBoard();
    } else {
      current = current===1 ? 2 :1;
    }
    moving = false;
    return;
  }

  // 逐步移动动画
  for(let i=1;i<=dice;i++){
    pos +=1;
    if(current===1 && pos>50){
      document.getElementById("winText").innerText="💘 玩家1胜利！";
      document.getElementById("winBox").style.display="flex";
      moving=false;
      return;
    }
    if(current===2 && pos>100){
      document.getElementById("winText").innerText="💘 玩家2胜利！";
      document.getElementById("winBox").style.display="flex";
      moving=false;
      return;
    }
    if(current===1) p1=pos; else p2=pos;
    updateBoard();
    await sleep(300);
  }

  // 显示任务
  let taskIndex = (pos-1) % tasks.length;
  let taskText = tasks[taskIndex];

  // 随机奖励或惩罚
  let rand = Math.random();
  let rpText = "";
  if(rand<0.25){ // 25%奖励
    let r = rewards[Math.floor(Math.random()*rewards.length)];
    rpText = r;
    if(r.includes("前进2格")){
      pos +=2;
      if(current===1 && pos>50){ document.getElementById("winText").innerText="💘 玩家1胜利！"; document.getElementById("winBox").style.display="flex"; moving=false; return;}
      if(current===2 && pos>100){ document.getElementById("winText").innerText="💘 玩家2胜利！"; document.getElementById("winBox").style.display="flex"; moving=false; return;}
      if(current===1) p1=pos; else p2=pos;
      updateBoard();
    }
    if(r.includes("额外再掷一次骰子")){
      current = current; // 不换玩家
    }
  } else if(rand>0.75){ // 25%惩罚
    let p = penalties[Math.floor(Math.random()*penalties.length)];
    rpText = p;
    if(p.includes("后退2格")){
      pos -=2; if(pos<1) pos=1;
      if(current===1) p1=pos; else p2=pos;
      updateBoard();
    }
    if(p.includes("本轮跳过一次")){
      skipNext[current]=true;
    }
  }

  document.getElementById("task").innerHTML = taskText + "<br><span style='color:#0f0'>" + rpText + "</span>";

  // 切换玩家（掷6或额外掷一次不换）
  if(!rpText.includes("额外再掷一次骰子") && dice!==6) current = current===1?2:1;
  document.getElementById("status").innerText="当前玩家："+current;

  moving=false;
}
</script>
