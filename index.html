  { zh: "🎁 指定下一条事件给对方", km: "🎁 កំណត់ព្រឹត្តិការណ៍បន្ទាប់ឲ្យគូស្នេហ៍" },
  { zh: "❤️ 说一句你喜欢这局游戏", km: "❤️ និយាយថាអ្នកចូលចិត្តល្បែងនេះ" },

  { zh: "💣 停下来深呼吸 3 次", km: "💣 ដកដង្ហើមជ្រៅ 3 ដង" }

/* ========= 棋盘绘制 ========= */
function drawBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  for (let i = 1; i <= totalCells; i++) {
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.innerText = i;
    if (playerPos[0] === i) cell.classList.add("player1");
    if (playerPos[1] === i) cell.classList.add("player2");
    board.appendChild(cell);
  }
}

/* ========= 掷骰 ========= */
function rollDice() {
  let dice = Math.floor(Math.random() * 6) + 1;
  let log = document.getElementById("log");

  log.innerHTML = `玩家 ${currentPlayer + 1} 🎲 掷出 ${dice}`;

  playerPos[currentPlayer] += dice;

  if (playerPos[currentPlayer] >= totalCells) {
    playerPos[currentPlayer] = totalCells;
    drawBoard();
    log.innerHTML += "<br>🏁 获胜！终极奖励触发";
    return;
  }

  /* === 触发事件（每 3 格一次） === */
  if (playerPos[currentPlayer] % 3 === 0) {
    let event = eventPool[eventIndex % eventPool.length];
    eventIndex++;

    log.innerHTML += `<br><br>${event.zh}<br>${event.km}`;

    if (event.zh.includes("后退 2")) playerPos[currentPlayer] -= 2;
    if (event.zh.includes("后退 3")) playerPos[currentPlayer] -= 3;
    if (event.zh.includes("后退 1")) playerPos[currentPlayer] -= 1;
    if (event.zh.includes("前进 2")) playerPos[currentPlayer] += 2;
    if (event.zh.includes("前进 1")) playerPos[currentPlayer] += 1;
  }

  drawBoard();
  currentPlayer = currentPlayer === 0 ? 1 : 0;
}

drawBoard();
</script>
